version: '3'

env:
  GOWORK: off  # works in the monorepo (overrides go.work) and in CI (no-op).

tasks:
  build:
    desc: "Build the lzfsec CLI"
    cmds:
      - go build -mod=mod ./...

  test:
    desc: "Run tests with race + combined coverage across all sub-packages"
    cmds:
      # Run each sub-package separately so its source lines land in
      # the per-package profile (one `go test -coverpkg=./... ./...`
      # would only profile the LAST package's source). The per-
      # package profiles are concatenated into one cover.out.
      - |
        set -eu
        rm -f cover.out /tmp/lzfsec_cov_*.out
        echo "mode: set" > cover.out
        for pkg in $(go list -mod=mod ./...); do
          name=$(echo "$pkg" | sed 's|.*/||')
          go test -mod=mod -race -coverpkg=./... \
            -coverprofile="/tmp/lzfsec_cov_${name}.out" "$pkg"
          tail -n +2 "/tmp/lzfsec_cov_${name}.out" >> cover.out
        done
        go tool cover -func=cover.out | tail -1

  lint:
    desc: "Vet the module"
    cmds:
      - go vet -mod=mod ./...

  ci:
    desc: "Run lint + build + test (used by the GitHub Actions workflow)"
    cmds:
      - task: lint
      - task: build
      - task: test
